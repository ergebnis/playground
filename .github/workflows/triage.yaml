# https://docs.github.com/en/actions

name: "Triage"

on: # yamllint disable-line rule:truthy
  # zizmor: ignore[dangerous-triggers] -- triage only adds labels via bot token.
  pull_request_target:
    types:
      - "opened"

permissions: {}

jobs:
  label:
    name: "Label"

    runs-on: "ubuntu-latest"

    timeout-minutes: 5

    steps:
      - name: "Add labels based on branch name"
        uses: "ergebnis/.github/actions/github/pull-request/add-label-based-on-branch-name@66eb779160e3d9602937916c45041e404129c411" # 1.9.2
        with:
          github-token: "${{ secrets.ERGEBNIS_BOT_TOKEN }}"
